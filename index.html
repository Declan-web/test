<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CASINO EDEN - TRUE FULLSCREEN</title>
    <style>
        :root {
            --dark-red: #7a0000;
            --deep-black: #0d0d0d;
        }

        body { 
            margin: 0; background-color: var(--deep-black); color: white; 
            font-family: 'Arial', sans-serif; display: flex; flex-direction: column; align-items: center; 
            overflow: hidden; width: 100vw; height: 100vh; position: relative;
        }
        
        #ui-layer { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; width: 100%; pointer-events: none; }
        #ui-layer * { pointer-events: auto; } /* UI 요소들은 클릭 가능하게 */

        #tab-menu { display: flex; gap: 10px; margin-top: 20px; }
        .tab-btn { padding: 10px 30px; background: #222; border: 1px solid #444; color: #888; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--dark-red); color: #fff; border-color: var(--dark-red); }

        h1 { color: var(--dark-red); font-size: 3.5em; margin-top: 20px; margin-bottom: 5px; font-family: 'Batang', 'Gungsuh', serif; letter-spacing: 5px; text-shadow: 0 0 20px rgba(0,0,0,1); }
        .description { color: #555; margin-bottom: 30px; font-size: 1em; font-weight: bold; height: 1.2em; }

        .game-section { display: none; flex-direction: column; align-items: center; width: 100%; }
        .game-section.active { display: flex; }

        /* 다트판: 최상위 레이어 + 화면 내부 고정 */
        #moving-dart {
            position: fixed; 
            width: 450px; height: 450px;
            z-index: 9999;
            cursor: crosshair;
            will-change: transform;
            display: none;
            top: 0; left: 0; /* 초기 위치 고정 후 transform으로 이동 */
        }

        #hud { width: 250px; background: #1a1a1a; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); }
        .stat-box { margin-bottom: 20px; }
        .label { color: #aaa; font-size: 0.8em; margin-bottom: 5px; text-transform: uppercase; }
        .val { font-size: 2em; font-weight: bold; color: #fff; }

        #slot-machine { width: 700px; background: #151515; padding: 50px; border-radius: 20px; border: 8px solid #2a2a2a; text-align: center; box-shadow: inset 0 0 80px #000; }
        .slot-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .slot-window { width: 120px; height: 160px; background: #000; border: 4px solid var(--dark-red); border-radius: 10px; overflow: hidden; position: relative; }
        .slot-reel { position: absolute; top: 0; left: 0; width: 100%; display: flex; flex-direction: column; transition: top 2s cubic-bezier(0.45, 0.05, 0.55, 0.95); }
        .slot-item { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; font-size: 4.5em; flex-shrink: 0; }
        
        .leaderboard { width: 800px; margin: 20px 0; background: #1a1a1a; padding: 25px; border-radius: 10px; }
        .rankList { list-style: none; padding: 0; margin: 0; max-height: 300px; overflow-y: auto; }
        .rankList li { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #2a2a2a; }

        .hit-mark {
            position: fixed; width: 12px; height: 12px; background: red; border: 2px solid white;
            border-radius: 50%; pointer-events: none; z-index: 10001; transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <img src="image_6.png" id="moving-dart" onclick="hitDart(event)">

    <div id="ui-layer">
        <div id="tab-menu">
            <div id="btn-dart" class="tab-btn" onclick="switchTab('dart')">DART GAME</div>
            <div id="btn-slot" class="tab-btn" onclick="switchTab('slot')">SLOT MACHINE</div>
        </div>

        <h1>CASINO EDEN</h1>

        <div id="dart-section" class="game-section">
            <div class="description">화면 전체를 누비는 타겟을 저격하라</div>
            <div style="display: flex; gap: 30px; align-items: flex-start;">
                <div id="hud">
                    <div class="stat-box"><div class="label">Darts Remaining</div><div id="darts-val" class="val">10</div></div>
                    <div class="stat-box"><div class="label">Total Score</div><div id="total-score" class="val">0</div></div>
                    <div class="stat-box"><div class="label">Last Hit</div><div id="hit-val" class="val">0</div></div>
                    <div id="over-ui" style="display:none;">
                        <input type="text" id="nick-dart" placeholder="NICKNAME">
                        <button onclick="saveResult('dart')">RECORD LEGACY</button>
                    </div>
                </div>
                <div class="leaderboard" style="width: 450px; margin: 0;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <h2 style="margin:0; color:var(--dark-red); font-size: 1.5em;">TOP 10</h2>
                        <button style="width:auto; padding:5px;" onclick="adminReset('dart')">RESET</button>
                    </div>
                    <ul id="rankList" class="rankList"></ul>
                </div>
            </div>
        </div>

        <div id="slot-section" class="game-section">
            <div id="slot-machine">
                <div id="slot-msg">CHALLENGE YOUR LUCK</div>
                <div class="slot-container">
                    <div class="slot-window"><div id="reel1" class="slot-reel"></div></div>
                    <div class="slot-window"><div id="reel2" class="slot-reel"></div></div>
                    <div class="slot-window"><div id="reel3" class="slot-reel"></div></div>
                    <div class="slot-window"><div id="reel4" class="slot-reel"></div></div>
                </div>
                <button id="spin-btn" onclick="spinSlot()">SPIN</button>
                <div id="slot-over-ui" style="display:none; margin-top:20px;">
                    <input type="text" id="slot-nick" placeholder="NICKNAME">
                    <button onclick="saveResult('slot')">RECORD LEGACY</button>
                </div>
            </div>
        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyC4cS9GhEAz32y9k11o5B950mbWxULZ1BY", databaseURL: "https://eden-dc2c5-default-rtdb.asia-southeast1.firebasedatabase.app" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const dartImg = document.getElementById('moving-dart');
    const dSize = 450; 
    let posX = Math.random() * (window.innerWidth - dSize);
    let posY = Math.random() * (window.innerHeight - dSize);
    
    // 속도 설정 (예측 불가능성 강화)
    let vx = 12; 
    let vy = 10; 
    let rot = 0;
    let score = 0, darts = 10, over = false;

    // 무작위 이동 강화 로직
    function randomizeMovement() {
        if(over) return;
        // 속도와 방향을 주기적으로 완전히 랜덤화 (0.8초~2초 사이)
        vx = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 10 + 8);
        vy = (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 10 + 8);
        setTimeout(randomizeMovement, Math.random() * 1200 + 800);
    }

    function moveDart() {
        if (over || !document.getElementById('dart-section').classList.contains('active')) {
            requestAnimationFrame(moveDart);
            return;
        }

        posX += vx; posY += vy;
        rot += 15;

        // 벽 충돌 판정 (화면 밖으로 나가지 않게 강제 고정)
        if (posX <= 0) { posX = 0; vx = Math.abs(vx); }
        if (posX >= window.innerWidth - dSize) { posX = window.innerWidth - dSize; vx = -Math.abs(vx); }
        if (posY <= 0) { posY = 0; vy = Math.abs(vy); }
        if (posY >= window.innerHeight - dSize) { posY = window.innerHeight - dSize; vy = -Math.abs(vy); }

        dartImg.style.transform = `translate(${posX}px, ${posY}px) rotate(${rot}deg)`;
        requestAnimationFrame(moveDart);
    }

    function hitDart(e) {
        if (over || darts <= 0) return;

        const rect = dartImg.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const dist = Math.sqrt((e.clientX - centerX)**2 + (e.clientY - centerY)**2);

        const m = document.createElement('div');
        m.className = 'hit-mark';
        m.style.left = e.clientX + 'px'; m.style.top = e.clientY + 'px';
        document.body.appendChild(m);

        let p = 0;
        if (dist < 15) p = 50; 
        else if (dist < 45) p = 25; 
        else if (dist < 210) p = Math.floor(Math.random() * 15) + 1;

        score += p; darts--;
        document.getElementById('hit-val').innerText = p;
        document.getElementById('total-score').innerText = score;
        document.getElementById('darts-val').innerText = darts;

        if (darts <= 0) {
            over = true;
            dartImg.style.display = 'none';
            document.getElementById('over-ui').style.display = 'block';
        }
    }

    function switchTab(game) {
        localStorage.setItem('activeGameTab', game); 
        const sections = document.getElementsByClassName('game-section');
        const btns = document.getElementsByClassName('tab-btn');
        for(let i=0; i<sections.length; i++) sections[i].classList.remove('active');
        for(let i=0; i<btns.length; i++) btns[i].classList.remove('active');
        document.getElementById(game + '-section').classList.add('active');
        document.getElementById('btn-' + game).classList.add('active');
        dartImg.style.display = (game === 'dart' && !over) ? 'block' : 'none';
    }

    window.addEventListener('DOMContentLoaded', () => {
        const savedTab = localStorage.getItem('activeGameTab') || 'dart';
        switchTab(savedTab);
        initReels();
        moveDart();
        randomizeMovement();
    });

    /* --- 슬롯머신 원본 로직 유지 --- */
    const slotItems = ['♠','◆','♥','♣','●','■']; 
    const weightedPool = ['♠','◆','◆', '♥','♥','♥', '♣','♣','♣', '♣', '●', '●', '●', '●', '●', '●', '■', '■', '■', '■', '■', '■'];
    function initReels() {
        for(let i=1; i<=4; i++) {
            const reel = document.getElementById('reel'+i); reel.innerHTML = '';
            for(let j=0; j<20; j++) {
                const sym = slotItems[Math.floor(Math.random()*slotItems.length)];
                const div = document.createElement('div');
                div.className = 'slot-item';
                div.innerText = sym; reel.appendChild(div);
            }
        }
    }
    function spinSlot() {
        document.getElementById('slot-over-ui').style.display = 'none';
        const btn = document.getElementById('spin-btn'); btn.disabled = true;
        const res = [];
        for(let i=1; i<=4; i++) {
            const reel = document.getElementById('reel'+i);
            const final = weightedPool[Math.floor(Math.random()*weightedPool.length)];
            res.push(final);
            reel.lastElementChild.innerText = final;
            reel.style.transition = "none"; reel.style.top = "0px";
            void reel.offsetWidth; 
            reel.style.transition = `top ${2 + (i-1)*0.4}s cubic-bezier(0.45, 0.05, 0.55, 0.95)`;
            reel.style.top = "-3040px";
        }
        setTimeout(() => {
            btn.disabled = false;
            const isWin = res.every(v => v === res[0]);
            if(isWin) document.getElementById('slot-over-ui').style.display = 'block';
            for(let i=1; i<=4; i++) {
                const reel = document.getElementById('reel'+i);
                reel.style.transition = "none"; reel.style.top = "0px";
                reel.firstElementChild.innerText = res[i-1];
            }
        }, 3500);
    }

    function saveResult(type) {
        const nickId = (type === 'dart') ? 'nick-dart' : 'slot-nick';
        const name = document.getElementById(nickId).value.trim();
        if(!name) return;
        const data = { name: name, score: (type === 'dart') ? score : 1000, date: firebase.database.ServerValue.TIMESTAMP };
        db.ref((type === 'dart') ? 'rankingPro' : 'slotRanking_v3').push().set(data, () => { location.reload(); });
    }
    function adminReset(type) { if(prompt("ADMIN") === "1119") db.ref(type === 'dart' ? 'rankingPro' : 'slotRanking_v3').remove(); }
    db.ref('rankingPro').on('value', (snap) => {
        const list = document.getElementById('rankList'); list.innerHTML = '';
        let arr = []; snap.forEach(c => { arr.push(c.val()); });
        arr.sort((a,b) => b.score - a.score).slice(0,10).forEach((v, i) => { list.innerHTML += `<li><span>#${i+1} ${v.name}</span><strong>${v.score} PT</strong></li>`; });
    });
</script>
</body>
</html>
